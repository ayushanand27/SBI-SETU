# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: https://github.com/ayushanand27/SBI-SETU → New Blueprint

services:
  - type: web
    name: sbi-setu-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://sbi-setu.onrender.com,http://localhost:5173,http://localhost:3000

  - type: web
    name: sbi-setu
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sbi-setu-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
